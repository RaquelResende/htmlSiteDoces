<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="descrisption"
      content=" site de vendas de doces brasileiros caseiros"
    />
    <title>HOME TOQUE BRASILEIRO</title>
    <link rel="stylesheet" type="text/css" href="Style.css" />
  </head>
  <body>
    <header class="cabecalho">
      <img
        class="cabecalho_imagem"
        src="logo.png"
        alt="logo do site de doces"
      />
      <nav class="cabecalho_menu">
        <a class="cabecalho_menu_item" href="">Sacola</a>
        <a class="cabecalho_menu_item" href="">contatos</a>
      </nav>
    </header>
    <main class="conteudo">
      <section class="conteudo_principal">
        <div class="conteudo_principal_escrito">
          <h1 class="conteudo_principal_escrito_titulo">Seja Bem-vindo(a)</h1>
          <h2 class="conteudo_principal_escrito_subtitulo">
            Aqui encontrará doces caseiros e braseileiros
          </h2>
          <button class="conteudo_principal_escrito_botao">veja mais</button>
        </div>
        <div>
          <img
            class="conteudo_principal_imagem"
            src="imgmain.png"
            alt="imagem de um cake de apresentação"
          />
        </div>
      </section>
      <div class="conteudo_secundario">
        <h3 class="conteudo_secundario_titulo">Escolha o seu sonho aqui</h3>
        <div class="contatos_secundario_card">
          <img class="conteudo_secundario_imagem" src="./logo.png" />
          <p class="contatos_secundario_card">marca</p>
          <button class="conteudo_secundario_butao">compre!</button>
        </div>
        <div class="contatos_secundario_card">
          <img class="conteudo_secundario_imagem" src="./logo.png" />
          <p class="contatos_secundario_card">marca</p>
          <button class="conteudo_secundario_butao">compre!</button>
        </div>
      </div>
    </main>

    <footer class="rodape">
      <img
        class="rodape_imagem_central"
        src="logo.png"
        alt="imagem da logo no footer para identificação das opçoes de pagamento"
      />
      <img class="rodape_imagem_secundaria" src="visa.png" />
      <img class="rodape_imagem_secundaria" src="elo.png" alt="" />
      <img class="rodape_imagem_secundaria" src="mastercard.webp" alt="" />
    </footer>
  </body>
</html>
